<!DOCTYPE html>
<html lang="en" dir="ltr" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>{{Title}}</title>
<!--[if mso]>
<noscript>
<xml>
<o:OfficeDocumentSettings>
<o:PixelsPerInch>96</o:PixelsPerInch>
</o:OfficeDocumentSettings>
</xml>
</noscript>
<style>
  table { border-collapse: collapse; }
</style>
<![endif]-->
<style>
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
  body { margin: 0; padding: 0; width: 100% !important; background-color: #F4F5F7; }
  a { color: #4F46E5; }

  @media screen and (max-width: 600px) {
    .email-container { width: 100% !important; }
    .fluid-padding { padding-left: 20px !important; padding-right: 20px !important; }
    .card-padding { padding: 28px 24px !important; }
    .btn-padding { padding: 0 24px 28px 24px !important; }
    .footer-padding { padding: 28px 20px 32px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#F4F5F7;">
<!-- Preheader: shown as inbox preview text, hidden in the message body itself. -->
<div style="display:none;font-size:1px;color:#F4F5F7;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
  {{Preheader}}
</div>

<center style="width:100%;background-color:#F4F5F7;">
<!--[if mso]>
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0"><tr><td>
<![endif]-->
<div class="email-container" style="max-width:600px;margin:0 auto;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;margin:0 auto;">

    <!-- Header / wordmark -->
    <tr>
      <td class="fluid-padding" style="padding:36px 24px 24px 24px;text-align:center;">
        <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:20px;font-weight:700;color:#111827;letter-spacing:0.2px;">
          <span style="color:#4F46E5;">●</span> {{CompanyName}}
        </span>
      </td>
    </tr>

    <!-- Card -->
    <tr>
      <td class="fluid-padding" style="padding:0 24px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
               style="background-color:#FFFFFF;border:1px solid #E5E7EB;border-radius:12px;box-shadow:0 1px 3px rgba(16,24,40,0.06);">

          <!-- Title + intro -->
          <tr>
            <td class="card-padding" style="padding:40px 40px 8px 40px;">
              <h1 style="margin:0 0 16px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:22px;line-height:1.35;font-weight:700;color:#111827;">
                {{Title}}
              </h1>
              <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.65;color:#374151;">
                {{BodyContent}}
              </div>
            </td>
          </tr>

          <!-- Primary CTA button (bulletproof table+padding technique — no VML needed,
               degrades to a plain link with square corners on clients that ignore
               border-radius; never breaks). -->
          <tr>
            <td class="btn-padding" style="padding:8px 40px 32px 40px;text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                <tr>
                  <td style="border-radius:8px;background-color:#4F46E5;">
                    <a href="{{PrimaryButtonUrl}}" target="_blank" rel="noopener"
                       style="display:inline-block;padding:14px 36px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;font-weight:600;color:#FFFFFF;text-decoration:none;border-radius:8px;">
                      {{PrimaryButtonText}}
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Secondary / security-help notice (optional per template) -->
          <tr>
            <td class="fluid-padding" style="padding:0 40px 40px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                     style="background-color:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;">
                <tr>
                  <td style="padding:20px 24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.65;color:#6B7280;">
                    {{SecondaryContent}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td class="footer-padding" style="padding:32px 24px 40px 24px;text-align:center;">
        <p style="margin:0 0 8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#9CA3AF;">
          {{FooterContent}}
        </p>
        <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#9CA3AF;">
          &copy; {{CurrentYear}} {{CompanyName}}. All rights reserved.
        </p>
      </td>
    </tr>

  </table>
</div>
<!--[if mso]>
</td></tr></table>
<![endif]-->
</center>
</body>
</html>
